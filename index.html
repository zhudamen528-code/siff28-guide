<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0d0d">
<title>第28届上影节 · 选片手册</title>
<style>
:root{--bg:#0d0d0d;--card:#1a1a1a;--c2:#222;--bd:#2e2e2e;--acc:#e8c96d;--t:#f0f0f0;--t2:#aaa;--t3:#666;--tag:#2a2a2a}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--t);font-family:-apple-system,"PingFang SC","Noto Sans SC",sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none}

/* Header */
.hd{background:linear-gradient(160deg,#1c0c00 0%,#0d0d0d 70%);border-bottom:1px solid #3a2500;padding:env(safe-area-inset-top,12px) 14px 10px;padding-top:max(env(safe-area-inset-top),12px);position:sticky;top:0;z-index:100}
.ht{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px}
.htx{flex:1}
.htx h1{font-size:16px;color:var(--acc);font-weight:700;letter-spacing:-.3px}
.htx p{font-size:11px;color:var(--t3);margin-top:3px}
.badge{background:var(--acc);color:#000;font-size:11px;font-weight:700;padding:4px 9px;border-radius:12px;white-space:nowrap;margin-top:2px}

/* Search */
.si{position:relative;margin-bottom:8px}
.si-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:14px;pointer-events:none}
input[type=search]{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--bd);border-radius:10px;padding:10px 12px 10px 34px;color:var(--t);font-size:16px;outline:none;-webkit-appearance:none;appearance:none}
input[type=search]:focus{border-color:var(--acc);background:rgba(255,255,255,.09)}
input[type=search]::placeholder{color:var(--t3)}

/* Filter rows */
.row{display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;scrollbar-width:none}
.row::-webkit-scrollbar{display:none}
.btn{background:rgba(255,255,255,.06);border:1px solid var(--bd);border-radius:15px;color:var(--t2);font-size:12px;padding:5px 11px;cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent;user-select:none;transition:background .12s,color .12s}
.btn.on{background:var(--acc);border-color:var(--acc);color:#000;font-weight:700}

/* Sort bar */
.sb{display:flex;align-items:center;gap:4px;padding:8px 14px;border-bottom:1px solid var(--bd);background:var(--bg);position:sticky;top:var(--hd-h,110px);z-index:90}
.sb-lbl{font-size:12px;color:var(--t3)}
.sb button{background:none;border:none;color:var(--t2);font-size:12px;padding:4px 8px;border-radius:6px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:color .12s}
.sb button.on{color:var(--acc);font-weight:700;background:#2a1e00}
.rc{margin-left:auto;font-size:12px;color:var(--t3)}

/* Movie list */
.ml{padding:8px 10px 24px;display:flex;flex-direction:column;gap:8px;padding-bottom:max(24px, env(safe-area-inset-bottom))}

/* Card */
.mc{background:var(--card);border:1px solid var(--bd);border-radius:13px;overflow:hidden;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:border-color .15s,transform .1s}
.mc:active{transform:scale(.99);opacity:.9}
.mc.ex{border-color:#5a4000}

/* Card main row */
.cm{display:flex;min-height:96px}
img.cp{width:72px;min-width:72px;height:108px;object-fit:cover;object-position:center top;border-right:1px solid var(--bd);display:block}
.ph{width:72px;min-width:72px;height:108px;background:linear-gradient(135deg,#1a1a1a,#242424);border-right:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.ci{flex:1;padding:9px 11px;display:flex;flex-direction:column;justify-content:space-between;min-width:0}

/* Card title row */
.ch{display:flex;align-items:flex-start;gap:6px;margin-bottom:3px}
.ct{flex:1;font-size:14px;font-weight:600;line-height:1.35;color:var(--t);word-break:break-all}
/* Rating pill */
.cr{display:inline-flex;align-items:center;gap:2px;background:#2a1c00;border:1px solid #5a3800;border-radius:6px;padding:3px 6px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.cr .s{color:var(--acc);font-size:10px;line-height:1}
.cr .v{color:var(--acc);font-size:12px;font-weight:700;line-height:1}
.cr.nr{background:rgba(255,255,255,.04);border-color:var(--bd)}
.cr.nr .v{color:var(--t3);font-size:10px}

/* Meta */
.ce{font-size:10px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:4px}
.tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px}
.tg{background:rgba(255,255,255,.05);border-radius:4px;font-size:10px;color:var(--t3);padding:2px 5px;line-height:1.3}
.tg.u{background:#1c1200;color:#a08040;border:1px solid #3a2500}

/* Bottom row */
.cb{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:4px}
.ar{margin-left:auto;font-size:12px;transition:transform .2s;color:var(--t3)}
.mc.ex .ar{transform:rotate(180deg)}

/* Expanded detail */
.cd{display:none;border-top:1px solid var(--bd);padding:12px}
.mc.ex .cd{display:block}
.pl{font-size:13px;color:var(--t2);line-height:1.65;margin-bottom:10px}
.pl.dim{color:var(--t3);font-style:italic}
.st{font-size:11px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}

/* Screening list */
.sl{display:flex;flex-direction:column;gap:5px}
.si2{background:var(--c2);border-radius:8px;padding:8px 10px;display:grid;grid-template-columns:auto auto 1fr auto;align-items:center;gap:6px}
.sd{background:var(--acc);color:#000;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap}
.sm{font-size:14px;font-weight:600;color:var(--t);white-space:nowrap}
.sv{min-width:0}
.sc{font-size:12px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sh{font-size:10px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.sg{font-size:10px;background:#152515;color:#5cb85c;border:1px solid #2a4a2a;padding:2px 6px;border-radius:4px;white-space:nowrap}

/* Empty state */
.nr2{text-align:center;padding:60px 20px;color:var(--t3)}
.nr2 .em{font-size:40px;margin-bottom:12px}
.nr2 p{font-size:14px}

/* Smooth scroll */
@media (prefers-reduced-motion:no-preference){
  html{scroll-behavior:smooth}
}
</style>
</head>

var ad='all',au='all',as_='default',sq='';
(function(){
  var units=[...new Set(M.map(function(m){return m.unit}))].sort();
  var uf=document.getElementById('uf');
  units.forEach(function(u){
    var b=document.createElement('button');
    b.className='btn';b.textContent=u;b.dataset.u=u;uf.appendChild(b);
  });
  // Measure header height for sticky sort bar
  function setHdH(){
    var hd=document.querySelector('.hd');
    document.querySelector('.sb').style.top=hd.offsetHeight+'px';
  }
  setHdH();
  window.addEventListener('resize',setHdH);

  document.getElementById('df').addEventListener('click',function(e){
    var b=e.target.closest('.btn');if(!b)return;
    ad=b.dataset.d;
    document.querySelectorAll('#df .btn').forEach(function(x){x.classList.toggle('on',x===b)});
    render();window.scrollTo(0,0);
  });
  document.getElementById('uf').addEventListener('click',function(e){
    var b=e.target.closest('.btn');if(!b)return;
    au=b.dataset.u;
    document.querySelectorAll('#uf .btn').forEach(function(x){x.classList.toggle('on',x===b)});
    render();window.scrollTo(0,0);
  });
  document.querySelector('.sb').addEventListener('click',function(e){
    var b=e.target.closest('button[data-s]');if(!b)return;
    as_=b.dataset.s;
    document.querySelectorAll('.sb button').forEach(function(x){x.classList.toggle('on',x===b)});
    render();window.scrollTo(0,0);
  });
  document.getElementById('q').addEventListener('input',function(e){
    sq=e.target.value.trim().toLowerCase();render();
  });
  render();
})();

function getList(){
  var list=M.filter(function(m){
    if(ad!=='all'&&!m.screenings.some(function(s){return s.date===ad}))return false;
    if(au!=='all'&&m.unit!==au)return false;
    if(sq){
      var h=(m.cn_name+' '+m.en_name+' '+m.director+' '+m.country+' '+m.unit).toLowerCase();
      if(h.indexOf(sq)<0)return false;
    }
    return true;
  });
  if(as_==='rating')list.sort(function(a,b){return(parseFloat(b.imdb_rating)||0)-(parseFloat(a.imdb_rating)||0)});
  else if(as_==='date')list.sort(function(a,b){
    var da=Math.min.apply(null,a.screenings.map(function(s){return parseInt(s.date.replace(/\D/g,''))}));
    var db=Math.min.apply(null,b.screenings.map(function(s){return parseInt(s.date.replace(/\D/g,''))}));
    return da-db;
  });
  return list;
}

function esc(s){
  return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):'';
}

function card(m){
  var sc=ad!=='all'?m.screenings.filter(function(s){return s.date===ad}):m.screenings;
  var dates=[...new Set(sc.map(function(s){return s.date}))];
  var ds=dates.map(function(d){return d.replace('6月','').replace('日','号')});
  var dstr=ds.length<=4?ds.join('·'):(ds.slice(0,4).join('·')+' +'+( dates.length-4));

  var poster=m.poster
    ?'<img class="cp" src="'+esc(m.poster)+'" loading="lazy" decoding="async" onerror="this.outerHTML=\'<div class=\\\"ph\\\">🎬</div>\'">'
    :'<div class="ph">🎬</div>';

  var rating=m.imdb_rating
    ?'<div class="cr"><span class="s">⭐</span><span class="v">'+esc(m.imdb_rating)+'</span></div>'
    :'<div class="cr nr"><span class="v">暂无评分</span></div>';

  var plot=m.plot_en
    ?'<p class="pl">'+esc(m.plot_en)+'</p>'
    :'<p class="pl dim">暂无简介（新片/冷门片/短片）</p>';

  var items=sc.map(function(s){
    return '<div class="si2">'
      +'<span class="sd">'+esc(s.date.replace('6月','').replace('日','号'))+'</span>'
      +'<span class="sm">'+esc(s.time)+'</span>'
      +'<div class="sv"><div class="sc">'+esc(s.cinema)+'</div><div class="sh">'+esc(s.hall)+'</div></div>'
      +(s.meeting?'<span class="sg">见面会</span>':'<span></span>')
      +'</div>';
  }).join('');

  var div=document.createElement('div');
  div.className='mc';
  div.innerHTML=
    '<div class="cm">'
      +poster
      +'<div class="ci">'
        +'<div>'
          +'<div class="ch"><div class="ct">'+esc(m.cn_name)+'</div>'+rating+'</div>'
          +'<div class="ce">'+esc(m.en_name||'')+'</div>'
          +'<div class="tags">'
            +'<span class="tg u">'+esc(m.unit)+'</span>'
            +(m.country?'<span class="tg">'+esc(m.country)+'</span>':'')
            +(m.duration?'<span class="tg">'+esc(m.duration)+'</span>':'')
          +'</div>'
        +'</div>'
        +'<div class="cb">'
          +'<span>📅 '+dstr+' &middot; '+sc.length+'场'+(m.director?' &nbsp;🎬 '+esc(m.director):'')+'</span>'
          +'<span class="ar">▾</span>'
        +'</div>'
      +'</div>'
    +'</div>'
    +'<div class="cd">'
      +plot
      +'<div class="st">📅 场次安排（'+sc.length+'场）</div>'
      +'<div class="sl">'+items+'</div>'
    +'</div>';

  div.addEventListener('click',function(){div.classList.toggle('ex')});
  return div;
}

function render(){
  var list=getList();
  var ml=document.getElementById('ml');
  ml.innerHTML='';
  document.getElementById('rc').textContent='共 '+list.length+' 部';
  if(!list.length){
    ml.innerHTML='<div class="nr2"><div class="em">🎭</div><p>没有符合条件的影片</p></div>';
    return;
  }
  var f=document.createDocumentFragment();
  list.forEach(function(m){f.appendChild(card(m))});
  ml.appendChild(f);
}

</script>
